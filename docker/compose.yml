services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://gynkol:gynkol@postgres:5432/gyn_kol
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "alembic", "upgrade", "head"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://gynkol:gynkol@postgres:5432/gyn_kol
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gynkol
      POSTGRES_PASSWORD: gynkol
      POSTGRES_DB: gyn_kol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gynkol"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
